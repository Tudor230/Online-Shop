spring.application.name=Online-Shop
spring.profiles.default=dev

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration

# Keycloak JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

# Keycloak Admin API (DB -> Keycloak profile sync)
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:4200/checkout/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:4200/checkout/cancel}
stripe.currency=RON
stripe.vat-rate=0.19
stripe.flat-shipping-amount=25.00

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Spring Actuator
management.endpoints.access.default=none

# Embedding search
ai.embedding.enabled=${EMBEDDING_SEARCH_ENABLED:true}
spring.ai.google.genai.embedding.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.embedding.text.options.model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
spring.ai.google.genai.embedding.text.options.task-type=${GEMINI_EMBEDDING_TASK_TYPE:RETRIEVAL_DOCUMENT}
spring.ai.google.genai.embedding.text.options.dimensions=${EMBEDDING_DIMENSION:768}
spring.ai.google.genai.embedding.text.options.auto-truncate=true

# Hybrid search tuning
search.hybrid.semantic-min-similarity=${HYBRID_SEARCH_MIN_SIMILARITY:0.58}
search.hybrid.rrf.k=${HYBRID_SEARCH_RRF_K:60}
search.hybrid.weight.lexical=${HYBRID_SEARCH_WEIGHT_LEXICAL:1.0}
search.hybrid.weight.semantic=${HYBRID_SEARCH_WEIGHT_SEMANTIC:1.0}

# Pagination
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=60

# Seeders
seeders.enabled=false
