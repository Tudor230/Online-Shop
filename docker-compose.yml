services:
  # --- APP DATABASE (MySQL for Spring Boot) ---
  shop-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: online-shop
      MYSQL_USER: user
      MYSQL_PASSWORD: 1235
    ports:
      - "3306:3306"
    volumes:
      - shop_mysql_data:/var/lib/mysql

  # --- AUTH DATABASE (Postgres for Keycloak) ---
  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data

  # --- AUTH SERVICE (Keycloak) ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"
    volumes:
      - ./infrastructure/keycloak-config:/opt/keycloak/data/import/
    depends_on:
      - keycloak-db

volumes:
  shop_mysql_data:
  keycloak_pg_data: