services:
  # --- APP DATABASE (PostgreSQL for Spring Boot) ---
  shop-db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: online-shop
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1235
    ports:
      - "5433:5432"
    volumes:
      - shop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- AUTH DATABASE (Postgres for Keycloak) ---
  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data

  # --- AUTH SERVICE (Keycloak) ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./infrastructure/keycloak-config:/opt/keycloak/data/import/
    depends_on:
      - keycloak-db

volumes:
  shop_pg_data:
  keycloak_pg_data:
