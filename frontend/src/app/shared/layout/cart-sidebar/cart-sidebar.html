@if (isOpen) {
  <div class="fixed inset-0 z-50">
    <button
      type="button"
      class="absolute inset-0 bg-black/5 backdrop-blur-sm"
      aria-label="Close cart"
      (click)="onCloseRequested()"
    ></button>

    <aside class="absolute right-0 top-0 h-full w-full max-w-md border-l border-surface-elevated bg-surface-default p-5 shadow-2xl">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-semibold text-text-primary">Shopping cart</h2>
        <button
          type="button"
          class="rounded-full bg-surface-elevated px-3 py-1 text-sm font-medium text-text-primary transition-colors hover:bg-surface-default"
          (click)="onCloseRequested()"
        >
          Close
        </button>
      </div>

      @if (!items.length) {
        <div class="mt-8 rounded-xl border border-surface-elevated bg-surface-elevated p-6 text-center text-text-secondary">
          Your cart is empty.
        </div>
      } @else {
        <div class="mt-5 grid max-h-[70vh] gap-0 overflow-y-auto pr-1">
          @for (item of items; track item.productId) {
            <article class="border-b border-surface-elevated py-4">
              <div class="grid grid-cols-[88px_minmax(0,1fr)_auto] items-start gap-3">
                <div class="h-20 w-20 overflow-hidden rounded-lg bg-surface-elevated">
                  <app-cloudinary-image-frame
                    [source]="item.imageId"
                    [alt]="item.title"
                    [options]="cartImageOptions"
                    width="160"
                    height="160"
                    [useLazy]="true"
                    imageClass="h-full w-full object-contain"
                    fallbackClass="grid h-full w-full place-items-center px-1 text-center text-[11px] font-medium text-text-secondary"
                    fallbackText="Image unavailable"
                  />
                </div>

                <div class="min-w-0">
                  <p class="truncate text-sm font-semibold text-text-primary">{{ item.title }}</p>
                  <div class="mt-3 inline-flex items-center gap-2">
                    <button
                      type="button"
                      class="h-8 w-8 rounded-full bg-surface-elevated text-base font-semibold text-text-primary transition-colors hover:bg-surface-default"
                      aria-label="Decrease quantity"
                      (click)="onDecrementRequested(item.productId)"
                    >
                      -
                    </button>
                    <span class="min-w-6 text-center text-sm font-semibold text-text-primary">{{ item.quantity }}</span>
                    <button
                      type="button"
                      class="h-8 w-8 rounded-full bg-surface-elevated text-base font-semibold text-text-primary transition-colors hover:bg-surface-default"
                      aria-label="Increase quantity"
                      (click)="onIncrementRequested(item.productId)"
                    >
                      +
                    </button>
                  </div>
                </div>

                <div class="text-right">
                  <p class="text-lg font-semibold text-text-primary">{{ item.price | currency : 'RON' : 'symbol' : '1.2-2' }}</p>
                  <button
                    type="button"
                    class="mt-3 text-sm font-semibold text-red-400 transition-colors hover:text-red-300"
                    (click)="onRemoveRequested(item.productId)"
                  >
                    Remove
                  </button>
                </div>
              </div>
            </article>
          }
        </div>
      }

      <div class="absolute bottom-0 left-0 right-0 border-t border-surface-elevated bg-surface-default p-5">
        <div class="flex items-center justify-between text-base font-semibold text-text-primary">
          <span>Total</span>
          <span>{{ totalPrice | currency : 'RON' : 'symbol' : '1.2-2' }}</span>
        </div>
        <button
          type="button"
          class="mt-4 w-full rounded-full bg-primary px-4 py-3 text-sm font-semibold text-primary-foreground transition-colors hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!items.length || isCheckoutInProgress"
          (click)="onCheckoutRequested()"
        >
          {{ isCheckoutInProgress ? 'Redirecting...' : 'Checkout' }}
        </button>
      </div>
    </aside>
  </div>
}
