<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-text-primary">Categories</h1>
    <button class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary-hover" (click)="startCreate()">Add Category</button>
  </div>

  @if (loading()) {
    <p class="text-sm text-text-secondary">Loading...</p>
  } @else {
    <div class="overflow-x-auto rounded-xl border border-surface-elevated bg-surface-default">
      <table class="w-full text-left text-sm">
        <thead class="border-b border-surface-elevated bg-surface-default text-text-secondary">
          <tr>
            <th class="px-4 py-3 font-medium">Name</th>
            <th class="px-4 py-3 font-medium">Slug</th>
            <th class="px-4 py-3 font-medium">Parent</th>
            <th class="px-4 py-3 font-medium text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-surface-elevated">
          @for (cat of categories(); track cat.id) {
            <tr class="transition-colors hover:bg-surface-elevated/50">
              <td class="px-4 py-3 text-text-primary">{{ cat.name }}</td>
              <td class="px-4 py-3 text-text-secondary">{{ cat.slug }}</td>
              <td class="px-4 py-3 text-text-secondary">{{ cat.parentId ?? '-' }}</td>
              <td class="px-4 py-3 text-right">
                <button class="mr-2 text-xs text-text-secondary hover:text-text-primary" (click)="startEdit(cat)">Edit</button>
                <button class="text-xs text-red-500 hover:text-red-700" (click)="deleteCategory(cat.id)">Delete</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

  @if (editing(); as edit) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
      <div class="w-full max-w-md rounded-xl border border-surface-elevated bg-surface-default p-6 shadow-xl">
        <h2 class="mb-4 text-lg font-bold text-text-primary">{{ edit.id ? 'Edit' : 'New' }} Category</h2>
        <div class="space-y-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-text-secondary">Name</label>
            <input class="w-full rounded-lg border border-surface-elevated bg-surface-default px-3 py-2 text-sm text-text-primary" [(ngModel)]="name" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-text-secondary">Slug</label>
            <input class="w-full rounded-lg border border-surface-elevated bg-surface-default px-3 py-2 text-sm text-text-primary" [(ngModel)]="slug" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-text-secondary">Parent ID</label>
            <input class="w-full rounded-lg border border-surface-elevated bg-surface-default px-3 py-2 text-sm text-text-primary" [(ngModel)]="parentId" placeholder="Leave empty for root" />
          </div>
        </div>
        <div class="mt-4 flex justify-end gap-2">
          <button class="rounded-lg border border-surface-elevated bg-surface-default px-4 py-2 text-sm text-text-primary hover:bg-surface-elevated" (click)="cancelEdit()">Cancel</button>
          <button class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary-hover" (click)="save()">Save</button>
        </div>
      </div>
    </div>
  }
</div>
