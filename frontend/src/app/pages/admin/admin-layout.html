<div class="flex min-h-[calc(100vh-4rem)]">
  <!-- Sidebar -->
  <aside class="w-60 shrink-0 border-r border-surface-elevated bg-surface-default">
    <nav class="flex flex-col gap-1 p-3">
      <a
        routerLink="/admin"
        routerLinkActive="bg-surface-elevated font-semibold text-text-primary"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-text-secondary transition-colors hover:bg-surface-elevated hover:text-text-primary"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
      <a
        routerLink="/admin/orders"
        routerLinkActive="bg-surface-elevated font-semibold text-text-primary"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-text-secondary transition-colors hover:bg-surface-elevated hover:text-text-primary"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        Orders
      </a>
      <a
        routerLink="/admin/products"
        routerLinkActive="bg-surface-elevated font-semibold text-text-primary"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-text-secondary transition-colors hover:bg-surface-elevated hover:text-text-primary"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
        Products
      </a>
      <a
        routerLink="/admin/users"
        routerLinkActive="bg-surface-elevated font-semibold text-text-primary"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-text-secondary transition-colors hover:bg-surface-elevated hover:text-text-primary"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Users
      </a>
      <a
        routerLink="/admin/categories"
        routerLinkActive="bg-surface-elevated font-semibold text-text-primary"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-text-secondary transition-colors hover:bg-surface-elevated hover:text-text-primary"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M12 2l-5.5 9h11z"/><circle cx="17.5" cy="17.5" r="4.5"/><path d="M3 13.5h8v8H3z"/></svg>
        Categories
      </a>
    </nav>
  </aside>

  <!-- Content -->
  <main class="flex-1 overflow-auto p-6">
    <router-outlet />
  </main>
</div>
